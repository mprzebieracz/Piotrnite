plugins {
    id 'application'
}

dependencies {    
  implementation project(":core")
}

application {
  mainClass = 'ServerLauncher'
}

jar {
    from project(':core').sourceSets.main.output
    manifest {
        attributes(
            'Main-Class': 'ServerLauncher'  // Replace with your fully qualified main class name
        )
    }
}
